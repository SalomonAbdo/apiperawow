version: "3.8"

services:
  apiperawow:
    image: wingsjuanka/apiperawow:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apiperawow
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-acore_auth}
      - API_KEY=${API_KEY}
    # Si la DB corre en otro contenedor (ej. AzerothCore stack),
    # descomenta 'networks' y ajusta el nombre de la red externa:
    # networks:
    #   - azerothcore_network

# networks:
#   azerothcore_network:
#     external: true

